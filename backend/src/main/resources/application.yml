spring:
  application:
    name: taskmanager

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kanban}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:kanban}
    password: ${DB_PASSWORD:kanban}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        transport:
          protocol: smtp

  servlet:
    multipart:
      max-file-size: ${ATTACHMENTS_MAX_MB:20}MB
      max-request-size: ${ATTACHMENTS_MAX_MB:20}MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  attachments:
    storage-path: ${ATTACHMENTS_PATH:./data/attachments}
    max-file-size-mb: ${ATTACHMENTS_MAX_MB:20}
  password-reset:
    ttl-minutes: ${PASSWORD_RESET_TTL_MIN:30}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.kanban.taskmanager: INFO
